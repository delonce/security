appname: auth-service
replicas: 2
port: 8081
tier: backend

image:
  repository: auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

database:
  host: postgres-auth
  port: 5432
  name: auth_db
  username: auth_user
  password: auth_password

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
