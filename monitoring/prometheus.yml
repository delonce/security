# Конфигурация Prometheus для сбора метрик сервисов
# Сервисы запущены на хосте (mvn spring-boot:run) — используем host.docker.internal
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Auth Service — метрики логина и refresh токенов (порт 8081 на хосте)
  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'auth-service'

  # User Service — метрики регистрации и валидации (порт 8082 на хосте)
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'user-service'

  # Role Service — метрики поиска ролей (порт 8083 на хосте)
  - job_name: 'role-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: 'role-service'
